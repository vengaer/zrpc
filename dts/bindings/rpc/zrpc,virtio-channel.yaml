description: |
  zRPC hypervisorless virtio channel.

include:
  - name: base.yaml
  - name: zrpc,channel.yaml

compatible: zrpc,virtio-channel

properties:
  reg:
    required: true
    description: |
      Address and size of the shared memory area to use.

      Must be the same for both channel endpoints.

  zrpc,virtio-rx-stack-size:
    type: int
    default: 512
    description: |
      Size of the stack of the per-backend RX thread.

  zrpc,virtio-ipm-stack-size:
    type: int
    default: 512
    description: |
      Size of the stack of the per-backend IPM thread.

  zrpc,virtio-ipm-handle:
    type: phandle
    required: true
    description: |
      Handle referring to the inter-process mailbox to use.

      Typically the same for both channel endpoints. Some IPM implementations may, however, require
      the values to differ.

  zrpc,virtio-ctrl-block-size:
    type: int
    default: 0x400
    description: |
      Default size of the shared memory control block.

      The backend reserves this number of bytes at the start of the shared memory section identified
      in the reg property for status flags.

      If unsure, leave unaltered. Must be the same for both endpoints.

  zrpc,virtio-virtqueue-num-extra-descs:
    type: int
    default: 16
    description:
      Number of struct vq_desc_extra instances to place after each virtqueue.

      If unsure, leave unaltered. Should be the same for both endpoints.

  zrpc,virtio-rx-queue-size:
    type: int
    default: 4
    description: |
      Number of entries that may be queued up in the RX queue.

      Queued up data is processed almost immediately. This value should rarely be large.

  zrpc,virtio-reply-queue-size:
    type: int
    default: 4
    description: |
      Number of RPC replies queued up in the driver. This property differs from
      zrpc,virtio-rx-queue-size in that the latter defines the size of a queue used
      internally by the driver to pass data from interrupt to process context whereas
      zrpc,virtio-reply-queue-size determines the size of the queue in which replies
      that have yet to be extracted by user code are buffered.

      Much like zrpc,virtio-rx-queue-size, this property rarely needs to be large.

  zrpc,virtio-max-concurrent-replies:
    type: int
    default: 4
    description: |
      Maximum concurrent number of replies in flight. Once the number is exceeded, newly issued RPCs
      fail until at least one of the outstanding RPCs has completed.

  zrpc,virtio-tx-chunk-size:
    type: int
    default: 512
    description: |
      Size of the memory chunks in which RPCs are transmitted. This setting effectively determines
      the maximum size of RPCs allowed over the channel. At the time of writing, said maximum
      is the value of this property - 16.

      Must be the same for both endpoints.

  zrpc,virtio-reply-lifetime:
    type: int
    default: 2000
    description: |
      Number of milliseconds an RPC is kept in the reply queue before being discarded.

      The longer an RPC remains in the queue, the larger the risk of the latter - the size of
      which is determined by the zrpc,virtio-max-concurrent-replies - the larger the risk of replies
      being discarded due to memory limitations. This risk is furter increased by issuing RPCs at a
      high rate.

  zrpc,virtio-rx-timeout:
    type: int
    default: 2000
    description: |
      Number of milliseconds to block in the zrpc_recv syscall waiting for a message with the
      expected sequence number.

examples: |
  # VirtIO configuration for the STM32H755 Cortex-M7
  -
    /* STM32 HSEM IPM mailbox */
    &mailbox {
      status = "okay";
    };

    /* sram4 is shared between the Cortex-M4 and the Cortex-M7 */
    &sram4 {
      #address-cells = <1>;
      #address-cells = <1>;

      status = "okay";

      zrpc_virtio: memory@38000000 {
        /* "zrpc,channel" must always be present */
        compatible = "zrpc,virtio-channel",
                     "zrpc,channel";

        /* Use the entire region */
        reg = <0x38000000 DT_SIZE_K(64)>;

        /* Must match the ID of the channel specified in the
         * configuration file */
        zrpc,channel-id = <0>;

        /* The Cortex-M7 is master */
        zrpc,host;

        /* Use HSEM-based inter-CPU notifications */
        zrpc,virtio-ipm-handle = <&mailbox>;

        /* Allow RPCs of at most 1024 bytes in size */
        zrpc,virtio-tx-chunk-size = <1024>;

        status = "okay";
      };
    };

  # VirtIO configuration for the STM32H755 Cortex-M4
  -
    /* Use the same IPM implementation as on the Cortex-M7 */
    &mailbox {
      status = "okay";
    };

    &sram4 {
      #address-cells = <1>;
      #address-cells = <1>;

      status = "okay";

      /* Everything but the zrpc,host property will typically match
       * the configuration used on the Cortex-M7 */
      zrpc_virtio: memory@38000000 {
        compatible = "zrpc,virtio-channel",
                     "zrpc,channel";

        reg = <0x38000000 DT_SIZE_K(64)>;

        zrpc,channel-id = <0>;

        /* The Cortex-M4 is slave, leave zrpc,host unset here */

        zrpc,virtio-ipm-handle = <&mailbox>;

        zrpc,virtio-tx-chunk-size = <1024>;

        status = "okay";
      };
    };
