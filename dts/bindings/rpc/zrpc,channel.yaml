description: |
  zRPC generic channel.

compatible: zrpc,channel

include: base.yaml

properties:
  zrpc,channel-id:
    type: int
    required: true
    description: |
      Numeric identifier of the channel to attach to the medium.

      Should match the ID of one of the channels in the zRPC configuration file. The RPCs
      defined for said channels are made available for the channel node.

      Must be the same for the two endpoints in a channel.

  zrpc,host:
    type: boolean
    description: |
      Set to configure zRPC node in host mode. Must be set for exactly one of the peers
      in a pair.

      Must be set for exactly one endpoint in a channel.

  zrpc,heap-size:
    type: int
    default: 256
    description: |
      Size of the per-channel heap, in bytes. Used only if CONFIG_ZRPC_HEAP_TYPE_PER_CHANNEL is set.

examples:
  - |
    &sram4 {
      virtio_channel_0: memory@38000000 {
        /* "zrpc,channel" must always be present, regardless of backend */
        compatible = "zrpc,virtio-channel";
                     "zrpc,channel";

        /* Attach RPC channel 0 to this device */
        zrpc,channel-id = <0>;

        /* This endpoint is RPC host */
        zrpc,host;

        /* ... */
      };
    };
