channels:
  - name: virtio
    id: 0
    rpcs:
      - name: get_uid
        parameters:
          - name: uid
            type: uint8_t *
            size: &uid-size size
            description: Buffer to store the retrieved UID in.
            direction: out
          - name: *uid-size
            type: uint32_t
            description: Size of the buffer at @c uid.
        brief: Get MCU UID.
        description: |
          The stm32h755 MCU comes with a unique 96-bit identifier accessible
          from the Cortex-M7 CPU. Fetch this identifier via RPC.
        origin: [ remote, host ]
      - name: heartbeat
        brief: Send heartbeat to peer.
        description: |
          Send a heartbeat RPC to the peer.
        origin: [ host, remote ]
      - name: forward_rtp_pkt
        parameters:
          - name: rtp_pkt
            type: uint8_t const *
            size: &rtp-pkt-size rtp_pkt_size
            description: The RTP packet to forward
            direction: in
          - name: *rtp-pkt-size
            type: uint32_t
            description: Size of the packet at @p rtp_pkt.
        brief: Forward RTP packet over RPC.
        description: |
          Forward complete RTP packet over RPC.
        origin: [ remote ]
        want_reply: False
    description:
      VirtIO-backed shared memory channel.
